{% extends "base.html" %}
{% block title %}Timers: Pantry Raider{% endblock %}

{% block content %}
<div class="mt-3 mb-3 d-flex align-items-center justify-content-between">
  <h4 class="mb-0"><i class="bi bi-stopwatch me-2"></i>Timers</h4>
</div>

<div id="timersEmpty" class="text-center text-secondary py-5">
  <div style="font-size:3rem;"><i class="bi bi-stopwatch"></i></div>
  <p class="fs-3 mb-0">No timers running</p>
</div>

<div id="timersGrid" class="row g-3 d-none"></div>

<style>
  .timer-card .timer-label {
    font-size: 1.6rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .timer-card .timer-count {
    font-size: 5.5rem;
    font-weight: 700;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
  }
  .timer-card.timer-expired {
    border-color: var(--bs-danger);
    background-color: rgba(var(--bs-danger-rgb), 0.15);
  }
  .timer-card.timer-expired .timer-count { color: var(--bs-danger); }
</style>

<script>
(function () {
  "use strict";

  var grid = document.getElementById("timersGrid");
  var empty = document.getElementById("timersEmpty");

  // Latest snapshot from the server. Each entry carries deadline_epoch so we can
  // tick locally between polls (the timers API publishes an absolute wall-clock
  // deadline for exactly this cross-surface use).
  var timers = [];

  function pad(n) { return n < 10 ? "0" + n : String(n); }

  function fmt(totalSeconds) {
    var s = Math.max(0, Math.floor(totalSeconds));
    var m = Math.floor(s / 60);
    var sec = s % 60;
    if (m >= 60) {
      var h = Math.floor(m / 60);
      m = m % 60;
      return h + ":" + pad(m) + ":" + pad(sec);
    }
    return pad(m) + ":" + pad(sec);
  }

  function render() {
    if (!timers.length) {
      grid.classList.add("d-none");
      grid.innerHTML = "";
      empty.classList.remove("d-none");
      return;
    }
    empty.classList.add("d-none");
    grid.classList.remove("d-none");

    var nowEpoch = Date.now() / 1000;
    var html = "";
    for (var i = 0; i < timers.length; i++) {
      var t = timers[i];
      // Prefer the shared epoch deadline; fall back to the server remaining.
      var remaining;
      if (typeof t.deadline_epoch === "number") {
        remaining = t.deadline_epoch - nowEpoch;
      } else {
        remaining = t.remaining_seconds;
      }
      var expired = remaining <= 0;
      var label = (t.label || "Timer").toString();
      // Escape the label for safe insertion as text.
      var safe = label.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      var cls = expired ? "timer-card timer-expired" : "timer-card";
      var badge = expired
        ? '<span class="badge bg-danger fs-5">Done</span>'
        : '<span class="badge bg-success fs-5">Running</span>';
      html += '<div class="col-12 col-md-6 col-xl-4">' +
        '<div class="card h-100 ' + cls + '">' +
        '<div class="card-body text-center">' +
        '<div class="d-flex align-items-center justify-content-between mb-2">' +
        '<span class="timer-label">' + safe + '</span>' + badge +
        '</div>' +
        '<div class="timer-count">' + fmt(remaining) + '</div>' +
        '</div></div></div>';
    }
    grid.innerHTML = html;
  }

  async function poll() {
    try {
      var resp = await fetch("timers", { headers: { "Accept": "application/json" } });
      if (resp.ok) {
        var data = await resp.json();
        timers = (data && data.timers) || [];
      }
    } catch (e) {
      // Network hiccup or /timers unreachable: keep the last snapshot and let
      // the local tick keep counting down. Never surface an error on the kiosk.
    }
    render();
  }

  // Tick locally every second for a smooth countdown, and refresh the snapshot
  // from the server every second so newly created or cancelled timers appear.
  poll();
  setInterval(poll, 1000);
  setInterval(render, 1000);
})();
</script>
{% endblock %}
