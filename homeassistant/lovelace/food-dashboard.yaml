title: Food Tracker
views:
  - title: Food
    path: food
    icon: mdi:fridge-outline
    cards:

      # ── Summary Row ──────────────────────────────────────────────────────────
      - type: glance
        title: Food Status
        entities:
          - entity: sensor.food_expired
            name: Expired
          - entity: sensor.food_expiring_today
            name: Today
          - entity: sensor.food_expiring_3_days
            name: 3 Days
          - entity: sensor.food_expiring_7_days
            name: 7 Days

      # ── Status Summary ───────────────────────────────────────────────────────
      - type: markdown
        title: Alerts
        content: >
          {% set expired = states('sensor.food_expired') | int(-1) %}
          {% set today = states('sensor.food_expiring_today') | int(-1) %}
          {% set d3 = states('sensor.food_expiring_3_days') | int(-1) %}
          {% set d7 = states('sensor.food_expiring_7_days') | int(-1) %}
          {% if expired > 0 %}❌ **{{ expired }} item(s) EXPIRED** — check fridge

          {% endif %}
          {% if today > 0 %}🔴 **{{ today }} expiring today** — use them up!

          {% endif %}
          {% if d3 > 0 %}🟠 {{ d3 }} expiring within 3 days

          {% endif %}
          {% if d7 > 0 %}🟡 {{ d7 }} expiring within 7 days

          {% endif %}
          {% if expired == 0 and today == 0 and d3 == 0 and d7 == 0 %}✅ Nothing expiring in the next 7 days{% endif %}
          {% if expired < 0 %}*Sensors loading...*{% endif %}

      # ── Quick Links ──────────────────────────────────────────────────────────
      - type: entities
        title: FoodAssistant
        entities:
          - type: weblink
            name: Expiring Items
            url: http://192.168.1.170:9284/ui/
            icon: mdi:clock-alert-outline

          - type: weblink
            name: Add Food (Scan / Photo / Manual)
            url: http://192.168.1.170:9284/ui/add
            icon: mdi:barcode-scan

          - type: weblink
            name: Expiry Defaults
            url: http://192.168.1.170:9284/ui/defaults
            icon: mdi:table-edit

          - type: weblink
            name: Grocy (Stock Overview)
            url: http://192.168.1.170:9383/stockoverview
            icon: mdi:fridge
