services:
  service:
    build: ./service
    container_name: foodassistant-service
    env_file: .env
    environment:
      - TZ=America/New_York
    volumes:
      - ./service/app:/app/app
      - ./service/data:/app/data
    ports:
      - "9284:8000"
    restart: unless-stopped
    depends_on:
      grocy:
        condition: service_started
        required: false   # Grocy is only present when --profile with-grocy is used

  # Optional Grocy instance — only started with:
  #   docker compose --profile with-grocy up -d
  # Skip this if you already have Grocy running elsewhere and just point
  # GROCY_BASE_URL at it in the web setup (/setup) or .env.
  grocy:
    image: lscr.io/linuxserver/grocy:latest
    container_name: foodassistant-grocy
    profiles: ["with-grocy"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./grocy/config:/config
    ports:
      - "9383:80"
    restart: unless-stopped

  # Ollama local vision — only started with:
  #   docker compose --profile with-ollama up -d
  # After starting, pull a vision model:
  #   docker exec foodassistant-ollama ollama pull llava:7b
  ollama:
    image: ollama/ollama:latest
    container_name: foodassistant-ollama
    profiles: ["with-ollama"]
    volumes:
      - ./ollama/models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # Intel Arc GPU passthrough (uncomment if applicable):
    # devices:
    #   - /dev/dri:/dev/dri
    # environment:
    #   - OLLAMA_GPU=intel
