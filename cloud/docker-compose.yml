# Forager (Pantry Raider's cloud service): app + Postgres + Caddy (TLS),
# for a single VPS.
# Copy .env.example to .env and fill in the secrets before `docker compose up -d`.
services:
  app:
    build: .
    restart: unless-stopped
    # Every CLOUD_* setting in .env flows through here, so adding a new one
    # (an admin email, a Stripe price id, the Google OAuth client) needs no
    # compose edit. Only the database URL is computed, since it interpolates
    # the Postgres password.
    env_file: .env
    environment:
      CLOUD_DATABASE_URL: postgresql+psycopg2://pantry:${POSTGRES_PASSWORD:?set in .env}@db:5432/pantrycloud
      CLOUD_AI_FORWARDER: ${CLOUD_AI_FORWARDER:-gemini}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pantry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: pantrycloud
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantry -d pantrycloud"]
      interval: 5s
      timeout: 3s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CLOUD_DOMAIN: ${CLOUD_DOMAIN:?set in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
